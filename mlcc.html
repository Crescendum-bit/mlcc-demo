<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLCC 圧電効果と音鳴きシミュレーター</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f5f7fa; color: #333; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 24px; width: 100%; max-width: 650px; box-sizing: border-box; }
        h2 { margin-top: 0; text-align: center; color: #1a202c; }
        .control-panel { display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 24px; background: #f8fafc; padding: 16px; border-radius: 8px; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 600; font-size: 14px; color: #4a5568; }
        select, input[type="range"] { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        .val-disp { font-weight: normal; color: #3182ce; float: right; }
        
        .visualizer { position: relative; width: 100%; height: 260px; background: #1e293b; border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
        .pcb { position: absolute; bottom: 60px; left: 10%; width: 80%; height: 12px; background: #065f46; border-radius: 2px; transform-origin: center center; transition: transform 0.05s linear; border-bottom: 3px solid #044e39; }
        .mlcc { position: absolute; bottom: 72px; left: 42%; width: 16%; height: 40px; background: #8a7a6e; border-radius: 4px; box-sizing: border-box; border-left: 12px solid #cbd5e1; border-right: 12px solid #cbd5e1; transform-origin: bottom center; }
        
        .sound-wave { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; justify-content: center; width: 100%; opacity: 0; }
        .wave-arc { width: 40px; height: 40px; border: 3px solid #63b3ed; border-radius: 50%; border-bottom: none; border-left: none; border-right: none; transform: rotate(0deg); animation: ripple 1s infinite linear; }
        .wave-arc:nth-child(2) { animation-delay: 0.3s; }
        .wave-arc:nth-child(3) { animation-delay: 0.6s; }
        
        .status-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        
        .chart-container { width: 100%; height: 80px; background: #0f172a; border-radius: 8px; overflow: hidden; }
        canvas { width: 100%; height: 100%; }
        
        @keyframes ripple {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>MLCC 圧電効果リアルタイムシミュレーター</h2>
    
    <div class="control-panel">
        <div class="control-group">
            <label>コンデンサ誘電体材料の種類</label>
            <select id="material">
                <option value="piezo">X7R / X5R (チタン酸バリウム含有 - 圧電効果あり)</option>
                <option value="non-piezo">C0G / NP0 (ジルコン酸カルシウム - 圧電効果なし)</option>
            </select>
        </div>
        <div class="control-group">
            <label>ACリップル電圧振幅 (AC Ripple)<span class="val-disp" id="v-val">5.0 V</span></label>
            <input type="range" id="voltage" min="0" max="10" step="0.1" value="5">
        </div>
        <div class="control-group">
            <label>信号周波数 (Frequency)<span class="val-disp" id="f-val">10.0 kHz</span></label>
            <input type="range" id="freq" min="2" max="30" step="0.5" value="10">
        </div>
    </div>

    <div class="visualizer">
        <div class="status-badge" id="status-text">稼働中</div>
        <div class="sound-wave" id="wave-box">
            <div class="wave-arc"></div>
            <div class="wave-arc"></div>
            <div class="wave-arc"></div>
        </div>
        <div class="mlcc" id="mlcc-el"></div>
        <div class="pcb" id="pcb-el"></div>
    </div>

    <div class="chart-container">
        <canvas id="wave-canvas"></canvas>
    </div>
</div>

<script>
    const materialSel = document.getElementById('material');
    const voltageSlider = document.getElementById('voltage');
    const freqSlider = document.getElementById('freq');
    const vVal = document.getElementById('v-val');
    const fVal = document.getElementById('f-val');
    
    const mlcc = document.getElementById('mlcc-el');
    const pcb = document.getElementById('pcb-el');
    const waveBox = document.getElementById('wave-box');
    const statusText = document.getElementById('status-text');
    const canvas = document.getElementById('wave-canvas');
    const ctx = canvas.getContext('2d');

    let animationFrame;
    let angle = 0;

    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function updateSimulation() {
        const mat = materialSel.value;
        const V = parseFloat(voltageSlider.value);
        const F = parseFloat(freqSlider.value);

        vVal.innerText = V.toFixed(1) + ' V';
        fVal.innerText = F.toFixed(1) + ' kHz';

        // 可聴かどうかのチェック
        let isPiezo = (mat === 'piezo');
        let isAudible = (F <= 20);

        if (!isPiezo || V === 0) {
            statusText.innerText = !isPiezo ? "圧電効果なし：静止" : "AC信号なし";
            statusText.style.color = "#94a3b8";
            waveBox.style.opacity = "0";
            mlcc.style.transform = "scale(1)";
            pcb.style.transform = "scaleY(1)";
        } else {
            if (isAudible) {
                statusText.innerText = `音鳴きが聞こえます (${F.toFixed(1)} kHz)`;
                statusText.style.color = "#ef4444";
                waveBox.style.opacity = (V / 10).toString();
            } else {
                statusText.innerText = `超音波 (${F.toFixed(1)} kHz - 人の耳には聞こえません)`;
                statusText.style.color = "#3b82f6";
                waveBox.style.opacity = "0";
            }
        }

        // 下部の波形図を描画
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
        ctx.strokeStyle = isPiezo ? '#38bdf8' : '#a7f3d0';
        ctx.lineWidth = 2;
        
        for (let x = 0; x < canvas.width; x++) {
            // DCバイアスを伴うACリップルの描画
            let y = (canvas.height / 2) + Math.sin(x * (F / 50) + angle) * (V * 2.5);
            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();

        // 物理アニメーションの変形処理 (滑らかなSin関数による振動シミュレーション)
        if (isPiezo && V > 0) {
            // 周波数が高くなるほど、アニメーション速度も加速
            angle += (F * 0.05);
            let offset = Math.sin(angle) * (V * 0.04);
            
            // MLCCの垂直・水平方向の交互の微小変形
            mlcc.style.transform = `scale(${1 + offset}, ${1 - offset})`;
            // PCB基板が連動して押し下げ、または引き上げられる（スピーカーの振動板効果をシミュレート）
            pcb.style.transform = `translateY(${offset * 12}px) rotate(${offset * 1}deg)`;
        }

        animationFrame = requestAnimationFrame(updateSimulation);
    }

    materialSel.addEventListener('change', () => { angle = 0; });
    updateSimulation();
</script>

</body>
</html>
